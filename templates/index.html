<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Database Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-table { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Student Database Manager</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Data Entry Form -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Add New Student</h5>
                    </div>
                    <div class="card-body">
                        <form id="studentForm">
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Gender</label>
                                <select class="form-select" id="gender" required>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Enroll in Course</label>
                                <select class="form-select" id="courseSelect" required>
                                    <option value="">Loading courses...</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Add Student</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Query Section -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Database Queries</h5>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-light" onclick="runQuery(1)">All Students</button>
                            <button class="btn btn-sm btn-light" onclick="runQuery(2)">Age > 21</button>
                            <button class="btn btn-sm btn-light" onclick="runQuery(4)">By Gender</button>
                            <button class="btn btn-sm btn-light" onclick="runQuery(6)">Enrollments</button>
                            <button class="btn btn-sm btn-danger" onclick="cleanupUnenrolled()">Cleanup Unenrolled</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="queryDescription" class="mb-3 text-muted">Select a query to view results.</div>
                        <div class="result-table">
                            <table class="table table-hover table-striped" id="resultTable">
                                <thead class="table-dark">
                                    <tr id="tableHeader"></tr>
                                </thead>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const studentForm = document.getElementById('studentForm');
        const courseSelect = document.getElementById('courseSelect');
        const queryDescription = document.getElementById('queryDescription');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');

        const queryLabels = {
            1: "Showing all students in the database.",
            2: "Filtering students who are older than 21.",
            4: "Counting students grouped by gender.",
            6: "Counting enrollments for courses with 3 or more credits."
        };

        // Fetch courses for the dropdown
        async function loadCourses() {
            try {
                const response = await fetch('/api/courses');
                const courses = await response.json();
                courseSelect.innerHTML = courses.map(c => 
                    `<option value="${c.course_id}">${c.course_name} (${c.credits} credits)</option>`
                ).join('');
            } catch (error) {
                courseSelect.innerHTML = '<option value="">Error loading courses</option>';
            }
        }

        studentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentData = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                email: document.getElementById('email').value,
                course_id: parseInt(courseSelect.value)
            };

            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Student added successfully!');
                    studentForm.reset();
                    runQuery(1); // Refresh list
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Failed to connect to server.');
            }
        });

        async function runQuery(id) {
            queryDescription.innerText = queryLabels[id] || "Executing query...";
            try {
                const response = await fetch(`/api/queries/${id}`);
                const data = await response.json();
                
                if (data.length > 0) {
                    // Build Header
                    const columns = Object.keys(data[0]);
                    let headerHtml = '<th>#</th>' + columns.map(col => `<th>${col.replace('_', ' ').toUpperCase()}</th>`).join('');
                    if (id === 1) headerHtml += '<th>ACTIONS</th>';
                    tableHeader.innerHTML = headerHtml;
                    
                    // Build Body
                    tableBody.innerHTML = data.map((row, index) => {
                        let rowHtml = `<td>${index + 1}</td>` + columns.map(col => `<td>${row[col]}</td>`).join('');
                        if (id === 1) {
                            rowHtml += `<td><button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${row.student_id})">Delete</button></td>`;
                        }
                        return `<tr>${rowHtml}</tr>`;
                    }).join('');
                } else {
                    tableHeader.innerHTML = '';
                    tableBody.innerHTML = '<tr><td colspan="100" class="text-center">No results found</td></tr>';
                }
            } catch (error) {
                alert('Failed to fetch query results.');
            }
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;
            try {
                const response = await fetch(`/api/students/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    runQuery(1);
                } else {
                    const res = await response.json();
                    alert('Error: ' + res.error);
                }
            } catch (error) {
                alert('Failed to delete student.');
            }
        }

        async function cleanupUnenrolled() {
            if (!confirm('This will delete all students who are not enrolled in any course. Proceed?')) return;
            try {
                const response = await fetch('/api/students/cleanup', { method: 'POST' });
                const result = await response.json();
                alert(result.message);
                runQuery(1);
            } catch (error) {
                alert('Failed to cleanup students.');
            }
        }

        // Initial load
        loadCourses();
        runQuery(1);
    </script>
</body>
</html>
